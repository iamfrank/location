<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 300 300">
  <!-- Compass face -->
  <circle cx="150" cy="150" r="130" fill="#f5f0e8" stroke="#333" stroke-width="2" opacity="0.5"/>

  <!-- Tick marks every 10 degrees (rotate a vertical line around center) -->
  <!-- Cardinal ticks: 0, 90, 180, 270 — long + thick -->
  <line x1="150" y1="20" x2="150" y2="50" stroke="#222" stroke-width="3"   transform="rotate(0   150 150)"/>
  <line x1="150" y1="20" x2="150" y2="50" stroke="#222" stroke-width="3"   transform="rotate(90  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="50" stroke="#222" stroke-width="3"   transform="rotate(180 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="50" stroke="#222" stroke-width="3"   transform="rotate(270 150 150)"/>
  <!-- Non-cardinal ticks — short + thin -->
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(10  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(20  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(30  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(40  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(50  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(60  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(70  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(80  150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(100 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(110 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(120 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(130 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(140 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(150 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(160 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(170 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(190 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(200 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(210 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(220 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(230 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(240 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(250 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(260 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(280 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(290 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(300 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(310 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(320 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(330 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(340 150 150)"/>
  <line x1="150" y1="20" x2="150" y2="38" stroke="#555" stroke-width="1.5" transform="rotate(350 150 150)"/>

  <!-- Cardinal labels -->
  <text x="150" y="72" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="red">N</text>
  <text x="150" y="232" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333">S</text>
  <text x="230" y="151" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333">E</text>
  <text x="70"  y="151" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333">W</text>
</svg>
